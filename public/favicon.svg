<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fondo del documento -->
  <rect x="12" y="8" width="40" height="48" rx="2" fill="#ffffff" stroke="#2c3e50" stroke-width="2"/>

  <!-- Esquina doblada (efecto documento) -->
  <path d="M 52 8 L 52 16 L 44 16 L 52 8" fill="#e0e0e0" stroke="#2c3e50" stroke-width="2"/>

  <!-- Líneas de texto -->
  <line x1="18" y1="22" x2="46" y2="22" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="28" x2="42" y2="28" stroke="#95a5a6" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="34" x2="38" y2="34" stroke="#95a5a6" stroke-width="2" stroke-linecap="round"/>

  <!-- Símbolo de pesos mexicano $ -->
  <circle cx="32" cy="44" r="8" fill="#27ae60" opacity="0.9"/>
  <text x="32" y="50" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">$</text>

  <!-- Checkmark (validación) -->
  <circle cx="48" cy="48" r="6" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <path d="M 45 48 L 47 50 L 51 45" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
